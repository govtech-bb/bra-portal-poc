name: Deploy to S3 + CloudFront

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # needed for OIDC role assumption

# Set these once in repo Settings → Secrets and variables → Actions → Variables
# (or use repository secrets if you prefer)
env:
  BUCKET: ${{ vars.AWS_BUCKET }}
  REGION: ${{ vars.AWS_REGION }}
  DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}

jobs:
  deploy:
    name: Sync site to S3 and invalidate CloudFront
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync . s3://$BUCKET/ \
            --exclude ".*" \
            --exclude ".github/*" \
            --exclude "*.md" \
            --exclude "*.sh" \
            --exclude "tamis-pdfs/*" \
            --exclude "node_modules/*" \
            --delete

      - name: Set cache headers on HTML (short cache)
        run: |
          aws s3 cp s3://$BUCKET/ s3://$BUCKET/ \
            --recursive --exclude "*" --include "*.html" \
            --metadata-directive REPLACE \
            --cache-control "public, max-age=60" \
            --content-type "text/html; charset=utf-8"

      - name: Set cache headers on CSS (long cache)
        run: |
          aws s3 cp s3://$BUCKET/ s3://$BUCKET/ \
            --recursive --exclude "*" --include "*.css" \
            --metadata-directive REPLACE \
            --cache-control "public, max-age=604800, immutable" \
            --content-type "text/css; charset=utf-8"

      - name: Set cache headers on SVG (long cache)
        run: |
          aws s3 cp s3://$BUCKET/ s3://$BUCKET/ \
            --recursive --exclude "*" --include "*.svg" \
            --metadata-directive REPLACE \
            --cache-control "public, max-age=604800, immutable" \
            --content-type "image/svg+xml"

      - name: Set cache headers on fonts (long cache)
        run: |
          aws s3 cp s3://$BUCKET/ s3://$BUCKET/ \
            --recursive --exclude "*" --include "*.woff2" \
            --metadata-directive REPLACE \
            --cache-control "public, max-age=604800, immutable" \
            --content-type "font/woff2"

      - name: Set cache headers on JS (medium cache)
        run: |
          aws s3 cp s3://$BUCKET/ s3://$BUCKET/ \
            --recursive --exclude "*" --include "*.js" \
            --metadata-directive REPLACE \
            --cache-control "public, max-age=300" \
            --content-type "application/javascript; charset=utf-8"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $DISTRIBUTION_ID \
            --paths "/*"

      - name: Summary
        run: |
          echo "### Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Bucket: \`$BUCKET\`" >> $GITHUB_STEP_SUMMARY
          echo "- Distribution: \`$DISTRIBUTION_ID\`" >> $GITHUB_STEP_SUMMARY
          echo "- Live in ~30 seconds at the CloudFront URL." >> $GITHUB_STEP_SUMMARY
